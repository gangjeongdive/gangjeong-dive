  </g>
  <text x="700" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="64" font-weight="800" fill="#061c4d">포인트 이미지 준비중</text>
  <text x="700" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#334155">여기에 강정다이브 포인트 안내 이미지를 넣어주세요</text>
  <text x="700" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#0284c7">파일명: images/point-map.svg 또는 point-map.jpg</text>
  <g fill="#0284c7" opacity="0.85">
    <circle cx="460" cy="610" r="16"/>
