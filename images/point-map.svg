<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#063b62" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <circle cx="1120" cy="140" r="190" fill="#ffffff" opacity="0.25"/>
  <circle cx="190" cy="720" r="240" fill="#ffffff" opacity="0.18"/>
  <path d="M80 620 C260 520, 360 680, 520 565 S850 470, 1010 560 S1210 660, 1320 540" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.55" stroke-linecap="round"/>
